name: PR to master

on:
  pull_request:
    branches: [ master ] 

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        r-version: [ '4.5.0' ]
        os: [macos-latest, windows-latest]
        arch: [ x64, arm64 ]
        exclude:
        - os: windows-latest
          arch: arm64
    env:
      RPROVIDER_LOG: true

    steps:
    - uses: actions/checkout@master
    - uses: r-lib/actions/setup-r@v2
      name: Setup R
      with:
          r-version: ${{ matrix.r-version }}
    - name: Set R_HOME environment variable
      run:   |
         if [ "$RUNNER_OS" == "Linux" ]; then
              mkdir -p ~/.local/lib/R
              echo "R_LIBS_USER=~/.local/lib/R" >> "$GITHUB_ENV"
              echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
         elif [ "$RUNNER_OS" == "macOS" ]; then
              echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
         elif [ "$RUNNER_OS" == "Windows" ]; then
              echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
         else
              echo "$RUNNER_OS not supported"
              exit 1
         fi
      shell: bash
    - name: Install R package dependencies
      run: Rscript -e "install.packages(c('tseries', 'zoo', 'ggplot2', 'svglite'), repos = 'https://cran.r-project.org')"
      shell: bash
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.100
    - name: Restore tool dependencies
      run: dotnet tool restore
    - name: Restore paket dependencies
      run: dotnet paket restore
    - name: Restore solution
      run: dotnet restore
    - name: Build and test
      run: dotnet fsi build.fsx
      timeout-minutes: 10
    - name: Check R log
      if: ${{ always() }}
      run:   |
        if [ "$RUNNER_OS" = "Linux" ]; then
            LOGFILE="${XDG_STATE_HOME:-$HOME/.local/state}/RProvider/rprovider.log"
        elif [ "$RUNNER_OS" = "macOS" ]; then
            LOGFILE="$HOME/Library/Logs/RProvider/rprovider.log"
        else
            LOGFILE="/c/Users/$USERNAME/AppData/Local/RProvider/rprovider.log"
        fi
        echo "Looking for log at: $LOGFILE"
        if [ -f "$LOGFILE" ]; then
            echo "=== RProvider log found ==="
            cat "$LOGFILE"
        else
            echo "No RProvider log file found"
        fi
      shell: bash